  <style>
    :root {
      --bg: #08090a;
      --panel: #0f1011;
      --surface: #191a1b;
      --surface-hover: #28282c;
      --fg: #f7f8f8;
      --fg-secondary: #d0d6e0;
      --fg-muted: #8a8f98;
      --fg-dim: #62666d;
      --accent: #5e6ad2;
      --accent-bright: #7170ff;
      --accent-hover: #828fff;
      --success: #10b981;
      --danger: #ff4d4d;
      --warning: #f59e0b;
      --border: rgba(255, 255, 255, 0.08);
      --border-subtle: rgba(255, 255, 255, 0.05);
      --font-main: 'Inter var', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-mono: ui-monospace, SF Mono, Menlo, monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: var(--bg);
      color: var(--fg);
      font-family: var(--font-main);
      font-feature-settings: "cv01", "ss03";
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* --- SIDEBAR --- */
    .sidebar {
      width: 240px;
      border-right: 1px solid var(--border);
      background: var(--panel);
      display: flex;
      flex-direction: column;
      padding: 16px;
      flex-shrink: 0;
      z-index: 100;
    }
    .brand { display: flex; align-items: center; gap: 12px; padding: 8px; margin-bottom: 24px; }
    .logo-mark { width: 24px; height: 24px; background: var(--accent); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: 900; color: white; }
    .nav-item { 
      display: flex; 
      align-items: center; 
      gap: 10px; 
      padding: 8px 12px; 
      border-radius: 6px; 
      color: var(--fg-secondary); 
      text-decoration: none; 
      font-size: 13px; 
      font-weight: 510; 
      margin-bottom: 2px; 
      cursor: pointer;
      transition: 0.2s;
    }
    .nav-item:hover { background: var(--surface-hover); color: var(--fg); }
    .nav-item.active { background: rgba(255,255,255,0.05); color: var(--fg); }
    .nav-item svg { width: 16px; height: 16px; opacity: 0.7; }

    /* --- VIEWPORT --- */
    .viewport { flex: 1; display: flex; flex-direction: column; min-width: 0; position: relative; }
    header {
      height: 64px;
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      background: rgba(8, 9, 10, 0.8);
      backdrop-filter: blur(8px);
      z-index: 50;
    }
    .view-title { font-size: 18px; font-weight: 510; letter-spacing: -0.02em; }
    #view-content { flex: 1; overflow-y: auto; position: relative; }

    /* --- COMMON UI ELEMENTS --- */
    .content-padding { padding: 32px; }
    .grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 20px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    .btn { background: var(--accent); color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 510; transition: 0.2s; display: inline-flex; align-items: center; gap: 8px; }
    .btn:hover { background: var(--accent-hover); }
    .btn-secondary { background: rgba(255,255,255,0.03); border: 1px solid var(--border); color: var(--fg-secondary); }
    .pill { background: rgba(255,255,255,0.05); border: 1px solid var(--border); padding: 4px 12px; border-radius: 99px; font-size: 12px; font-weight: 510; cursor: pointer; }
    .pill:hover { border-color: var(--fg-dim); }

    /* Tables */
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; padding: 12px 16px; color: var(--fg-dim); font-size: 10px; text-transform: uppercase; border-bottom: 1px solid var(--border-subtle); }
    td { padding: 14px 16px; border-bottom: 1px solid var(--border-subtle); color: var(--fg-secondary); }
    tr.clickable { cursor: pointer; }
    tr.clickable:hover { background: rgba(255,255,255,0.02); }

    /* --- DRILL DOWN COMPONENTS --- */
    #side-panel { position: fixed; right: -500px; top: 0; width: 440px; height: 100vh; background: var(--panel); border-left: 1px solid var(--border); z-index: 1000; transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); padding: 40px; box-shadow: -20px 0 60px rgba(0,0,0,0.5); }
    #side-panel.open { right: 0; }
    .panel-close { position: absolute; top: 20px; left: 20px; cursor: pointer; color: var(--fg-dim); font-size: 20px; }

    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 1100; padding: 40px; }
    .modal-content { background: var(--panel); width: 640px; padding: 40px; border-radius: 16px; border: 1px solid var(--border); position: relative; }

    /* --- TOAST --- */
    #toast-container { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%); z-index: 2000; display: flex; flex-direction: column; gap: 8px; }
    .toast { background: var(--surface); border: 1px solid var(--accent); padding: 12px 20px; border-radius: 8px; font-size: 13px; font-weight: 510; box-shadow: 0 10px 30px rgba(0,0,0,0.5); animation: toastIn 0.3s forwards; }
    @keyframes toastIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* --- DASHBOARD SPECIFIC --- */
    .kpi-row { grid-column: span 12; display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; margin-bottom: 8px; }
    .chart-box { grid-column: span 12; height: 300px; padding: 24px; position: relative; }
    
    /* --- COMPETITOR INTEL SPECIFIC --- */
    .ad-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
    .ad-card { aspect-ratio: 16/10; background: #111; cursor: pointer; border-radius: 8px; border: 1px solid var(--border); position: relative; padding: 16px; display: flex; flex-direction: column; justify-content: flex-end; }
    .ad-card:hover { border-color: var(--accent); }
    .ad-score { position: absolute; top: 12px; right: 12px; background: var(--success); color: black; font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 4px; }

    /* --- CAPI SPECIFIC --- */
    .funnel-step { height: 160px; background: linear-gradient(180deg, rgba(94,106,210,0.1), transparent); border: 1px solid var(--border); border-bottom: none; border-radius: 4px 4px 0 0; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; padding: 16px; flex: 1; position: relative; }
    .conv-label { position: absolute; top: -30px; font-size: 11px; font-weight: 600; color: var(--accent-bright); }

    /* --- CREATIVE GEN SPECIFIC --- */
    .gen-layout { display: flex; height: calc(100vh - 64px); }
    .gen-sidebar { width: 320px; border-right: 1px solid var(--border); background: var(--panel); padding: 24px; }
    .gen-workspace { flex: 1; padding: 32px; overflow-y: auto; }
    .fb-preview { width: 340px; background: white; border-radius: 8px; color: black; padding: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
  </style>
</head>

      content.innerHTML = VIEWS[viewId] || VIEWS.dashboard;
      
      // Update Sidebar Active State
      document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
      const items = Array.from(document.querySelectorAll('.nav-item'));
      const activeItem = items.find(el => el.getAttribute('onclick').includes(viewId));
      if (activeItem) activeItem.classList.add('active');

      // Update Title
      const titles = { dashboard: 'Dashboard', competitor: 'Competitor Intel', insights: 'AI Insights', log: 'Daily Log', alerts: 'Alerts', testing: 'A/B Testing', capi: 'CAPI', gen: 'Creative Generator' };
      document.getElementById('page-title').innerText = titles[viewId] || 'Dashboard';
      
      // Scroll to top
      content.scrollTop = 0;
    }

    function showToast(m) {
      const w = document.getElementById('toast-container');
      const t = document.createElement('div');
      t.className = 'toast';
      t.innerHTML = `✔ ${m}`;
      w.appendChild(t);
      setTimeout(() => {
        t.style.opacity = '0';
        setTimeout(() => t.remove(), 300);
      }, 3000);
    }

    function openPanel(name, roas, spend) {
      document.getElementById('panel-title').innerText = name;
      document.getElementById('panel-roas').innerText = roas;
      document.getElementById('panel-spend').innerText = spend;
      document.getElementById('side-panel').classList.add('open');
    }

    function closePanel() {
      document.getElementById('side-panel').classList.remove('open');
    }

    function openAd(brand, analysis) {
      document.getElementById('modal-title').innerText = brand;
      document.getElementById('modal-body').innerText = analysis;
      document.getElementById('ad-modal').style.display = 'flex';
    }

    function askAI(q) {
      const chat = document.getElementById('chat-thread');
      const userMsg = document.createElement('div');
      userMsg.style.cssText = "background:var(--panel); border:1px solid var(--accent); padding:16px; border-radius:12px; margin-bottom:12px; max-width:80%; margin-left:auto;";
      userMsg.innerText = q;
      chat.appendChild(userMsg);
      document.getElementById('chat-input').value = '';
      
      setTimeout(() => {
        const aiMsg = document.createElement('div');
        aiMsg.style.cssText = "background:var(--surface); border:1px solid var(--border); padding:16px; border-radius:12px; margin-bottom:12px; max-width:80%;";
        aiMsg.innerText = "Analyzing live account data... I recommend scaling the budget by 20% on the selected campaign. Performance remains stable.";
        chat.appendChild(aiMsg);
        chat.scrollTop = chat.scrollHeight;
      }, 600);
    }

    // Init
    navigate('dashboard');
  </script>
</body>
</html>
